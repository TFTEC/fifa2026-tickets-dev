name: Lab Oitavas de Final — Mensageria (Service Bus + Functions)

# Workflow ÚNICO do lab "Oitavas de Final" (Fase 1: Service Bus + Functions).
# Consolida a lógica de três workflows antes separados:
#   - migrate-phase-01.yml  (migrations idempotentes phase-01.sql + phase-03.sql)
#   - deploy-phase-01.yml   (build/test/publish/deploy da Azure Function + smoke)
#   - deploy-frontend.yml   (build Vite + deploy do Web App)
#
# Disparo MANUAL apenas (Actions → "Lab Oitavas de Final" → Run workflow).
# O input `acao` controla O QUE roda:
#   - tudo       → migrations → function → frontend (NESTA ORDEM)
#   - migrations → só as migrations do banco
#   - function   → só build/test/deploy da Function
#   - frontend   → só build/deploy do frontend
#
# DESIGN: um único job `lab` com STEPS sequenciais; cada bloco é guardado por
# `if: ${{ inputs.acao == 'tudo' || inputs.acao == '<bloco>' }}`. Isso garante a
# ordem correta e o seletor SEM cair na pegadinha do GitHub Actions onde um job
# pulado quebra o `needs` dos jobs downstream (não há `needs` entre blocos aqui).
#
# Pré-requisitos no fork (ver runbook docs/runbooks/aula1-f1-portal-guide-ambiente-hml-cin.md):
#   Secrets:  AZURE_CREDENTIALS, SQL_CONNECTION_STRING, FUNCTION_PUBLISH_PROFILE,
#             AZURE_FRONTEND_PUBLISH_PROFILE
#   Vars:      SQL_SERVER, RESOURCE_GROUP, FUNCTION_APP_NAME, FRONTEND_APP_NAME,
#             BACKEND_URL, FUNCTION_V2_URL

on:
  workflow_dispatch:
    inputs:
      acao:
        description: 'O que executar'
        type: choice
        required: true
        default: 'tudo'
        options:
          - tudo
          - migrations
          - function
          - frontend
      sql_server:
        description: '(opcional) SQL server name override — sem .database.windows.net'
        required: false
      resource_group:
        description: '(opcional) Resource group do SQL override'
        required: false
      function_app_name:
        description: '(opcional) Azure Function App name override'
        required: false
      frontend_app_name:
        description: '(opcional) Azure Web App (frontend) name override'
        required: false

env:
  # --- migrations ---
  DEFAULT_SQL_SERVER: 'sql-dev-tk-cin-001'
  DEFAULT_RESOURCE_GROUP: 'rg-hml-tik-cin-001'
  # --- function ---
  FUNCTION_PROJECT_PATH: 'src/Fifa2026.V2.Functions'
  DOTNET_VERSION: '8.0.x'
  # --- frontend ---
  FRONTEND_WORKING_DIR: 'Lovable/World Cup Tickets Hub'
  NODE_VERSION: '20'

jobs:
  lab:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # BLOCO 1 — MIGRATIONS  (acao = tudo | migrations)
      # =========================================================
      - name: '[migrations] Azure login (Service Principal)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: '[migrations] Resolver parâmetros + IP do runner'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        run: |
          set -euo pipefail
          # Precedência: input manual -> GitHub Variable -> default.
          SQL_SERVER="${{ inputs.sql_server || vars.SQL_SERVER || env.DEFAULT_SQL_SERVER }}"
          RG="${{ inputs.resource_group || vars.RESOURCE_GROUP || env.DEFAULT_RESOURCE_GROUP }}"
          RUNNER_IP="$(curl -fsS https://api.ipify.org)"
          RULE_NAME="gh-migrate-${{ github.run_id }}"
          {
            echo "SQL_SERVER=$SQL_SERVER"
            echo "RG=$RG"
            echo "RUNNER_IP=$RUNNER_IP"
            echo "RULE_NAME=$RULE_NAME"
          } >> "$GITHUB_ENV"
          echo "SQL: $SQL_SERVER | RG: $RG | runner IP: $RUNNER_IP | rule: $RULE_NAME"

      - name: '[migrations] Abrir acesso temporário (público + firewall do runner)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        run: |
          set -euo pipefail
          az sql server update -g "$RG" -n "$SQL_SERVER" --set publicNetworkAccess=Enabled -o none
          az sql server firewall-rule create -g "$RG" -s "$SQL_SERVER" \
            -n "$RULE_NAME" --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP" -o none
          echo "Acesso público + firewall abertos para $RUNNER_
